<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE NET | Internet Without The Leash</title>
    
    <!-- Preload kritické zdroje -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- Font-display swap pro lepší LCP -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-black: #1d1d1f;
            --apple-gray: #86868b;
            --apple-light-gray: #f5f5f7;
            --apple-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-black);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        /* Kritické animace - jen ty, co jsou vidět */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* Optimalizované blobby - nižší blur */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.25;
            will-change: transform;
            contain: layout style paint;
        }

        .blob-1 {
            top: -10%;
            left: 20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #e0f2fe 0%, transparent 70%);
        }

        .blob-2 {
            bottom: 10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #fce7f3 0%, transparent 70%);
        }

        .blob-3 {
            top: 40%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #e0f2fe 0%, transparent 70%);
        }

        /* Layout kontejner */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--apple-light-gray);
            border: none;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 36px;
            padding: 32px;
        }

        .glass-panel:hover {
            transform: scale(1.01);
        }

        .gradient-text {
            background: linear-gradient(135deg, #2563eb, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .puck-device {
            background: #1d1d1f;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            border-radius: 48px;
            will-change: auto;
            contain: layout style paint;
        }

        .puck-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
        }

        .puck-ring::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(255,255,255,0.4);
            animation: spin-slow 3s linear infinite;
        }

        .sticker {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transform: rotate(-6deg);
            transition: transform 0.3s ease;
            border-radius: 12px;
            padding: 12px 20px;
            contain: layout style;
        }

        .sticker:hover {
            transform: rotate(0deg) scale(1.05);
        }

        /* Navigation */
        nav {
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 50;
            background: var(--apple-bg);
            contain: layout style;
        }

        nav > div:first-child {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.02em;
            color: black;
            white-space: nowrap;
        }

        nav a {
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0071e3;
        }

        nav button {
            padding: 8px 20px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        nav button:hover {
            background: #333;
        }

        /* Main */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 128px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 128px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 40px;
            position: relative;
        }

        .hero-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            position: relative;
            max-width: 64rem;
            margin: 0 auto;
            z-index: 10;
        }

        .hero h1 {
            font-size: clamp(2.25rem, 5vw, 3.75rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 0.95;
            color: #1d1d1f;
            margin: 0;
        }

        .hero p {
            font-size: 1.25rem;
            color: #86868b;
            font-weight: 500;
            line-height: 1.5;
            max-width: 32rem;
            margin: 16px 0 0;
        }

        .hero-buttons {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
            font-weight: 500;
            font-size: 1rem;
            padding: 12px 32px;
            border-radius: 9999px;
            border: none;
            box-shadow: 0 0 0 1px rgba(0,113,227,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: #0077ED;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,113,227,0.3);
        }

        .btn-secondary {
            color: #0071e3;
            font-size: 1rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-secondary:hover {
            opacity: 0.7;
        }

        .puck-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 32px;
        }

        .puck-lg {
            width: clamp(256px, 70vw, 320px);
            height: clamp(256px, 70vw, 320px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: box-shadow 0.5s;
        }

        .puck-lg:hover {
            box-shadow: 0 0 40px rgba(0,113,227,0.2);
        }

        .puck-notch {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 6px;
            background: #333;
            border-radius: 100%;
            opacity: 0.5;
        }

        /* Tech Section */
        .tech-section {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-title {
            padding: 0 8px;
        }

        .section-title h2 {
            font-size: clamp(1.875rem, 5vw, 3rem);
            color: #1d1d1f;
            margin: 0 0 16px;
            font-weight: 700;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .tech-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .tech-card {
            border-radius: 36px;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            contain: layout style paint;
        }

        .tech-card:hover {
            transform: scale(1.01);
        }

        .tech-card-content {
            position: relative;
            z-index: 10;
            padding: 32px;
        }

        .tech-card-label {
            font-size: 11px;
            font-weight: 700;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: block;
        }

        .tech-card h3 {
            font-size: 2rem;
            color: #1d1d1f;
            margin: 0 0 8px;
            font-weight: 700;
        }

        .tech-card p {
            color: #86868b;
            font-size: 1.125rem;
            font-weight: 500;
            max-width: 20rem;
        }

        .tech-card-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 9999px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.08);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tech-card-footer {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 32px;
            margin-top: 48px;
            position: relative;
            z-index: 10;
        }

        .tech-card-price {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-radius: 16px;
            text-align: right;
        }

        .tech-card-price div {
            font-size: 1.5rem;
            color: #1d1d1f;
            font-weight: 700;
        }

        .tech-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0071e3;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .tech-card:hover .tech-icon {
            transform: scale(1.1);
        }

        /* Plans Section */
        .plans-section {
            display: flex;
            flex-direction: column;
            gap: 48px;
            text-align: center;
        }

        .plans-header {
            text-align: center;
        }

        .plans-header h2 {
            font-size: clamp(1.875rem, 5vw, 3rem);
            color: #1d1d1f;
            margin: 0 0 12px;
            font-weight: 700;
        }

        .plans-header p {
            color: #86868b;
            font-size: 1.125rem;
            font-weight: 500;
        }

            gap:
