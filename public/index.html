                    { text: 'Sdílej',      color: 'var(--sticker-pink)',   rotate: -3   },
                    { text: 'Objevuj',     color: 'var(--sticker-blue)',   rotate:  2   },
                    { text: 'Poslouchej', color: 'var(--sticker-orange)', rotate:  3   },
                    { text: 'Vytvářej',   color: 'var(--sticker-green)',  rotate: -2.5 },
                ],
            },
            scrollAnim: {
                shrinkStart:     0.65, // scroll progress (0–1) when card starts shrinking
                shrinkDuration:  0.35, // how long (in progress units) the shrink takes
                maxCardWidth:    1200, // max px width of the shrunk card
                maxHeightReduce: 80,   // px to subtract from 100vh at max shrink
                maxBorderRadius: 40,   // px border-radius at max shrink
                revealStagger:   0.1,  // scroll-progress gap between each reveal element
                revealDuration:  0.25, // scroll-progress span for each reveal element
            },
            carousel: {
                interval: 3500, // ms between auto-advances
            },
            filmstrip: {
                gap: 32, // px gap between cards (matches CSS gap: 2rem)
            },
        };

        // =========================================================
        // HELPERS
        // =========================================================

        /** Clamps a value between min and max. */
        const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

        /** Ease-out cubic (fast start, slow end). */
        const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

        /** Ease-in-out quad. */
        const easeInOutQuad = (t) =>
            t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

        /** Returns true when the user prefers reduced motion. */
        const prefersReducedMotion = () =>
            window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // =========================================================
        // FOOTER YEAR
        // =========================================================
        function initFooterYear() {
            const el = document.getElementById('footer-year');
            if (el) el.textContent = new Date().getFullYear();
        }

        // =========================================================
        // STICKER ANIMATION
        // Returns a cleanup function.
        // =========================================================
        function initSticker() {
            const sticker = document.getElementById('sticker');
            if (!sticker) return () => {};

            const { states, interval, exitDelay } = CONFIG.sticker;
            let index = 0;

            // Correct sticker cycle function:
            function tick() {
                sticker.classList.add('hidden');
                setTimeout(() => {
                    index = (index + 1) % states.length;
                    const { text, color, rotate } = states[index];
                    sticker.textContent = text;
                    sticker.style.backgroundColor = color;
                    sticker.style.transform = `translate(-50%, -50%) rotate(${rotate}deg)`;
                    sticker.classList.remove('hidden');
                }, exitDelay);
            }

            const timerId = setInterval(tick, interval);
            return () => clearInterval(timerId);
        }

        // =========================================================
        // FILMSTRIP CAROUSEL (horizontal scroll + arrow buttons)
        // =========================================================
        function initFilmstrip() {
            const filmstrip = document.getElementById('filmstrip');
            const btnPrev   = document.getElementById('btn-prev');
            const btnNext   = document.getElementById('btn-next');
            const cards     = filmstrip ? filmstrip.querySelectorAll('.filmstrip-card') : [];

            if (!filmstrip || !btnPrev || !btnNext || cards.length === 0) return;

            // Cache scroll amount; invalidate on resize.
            let cachedScrollAmt = 0;
            const getScrollAmt = () =>
                cachedScrollAmt || (cachedScrollAmt = cards[0].offsetWidth + CONFIG.filmstrip.gap);

            window.addEventListener('resize', () => { cachedScrollAmt = 0; }, { passive: true });
            btnNext.addEventListener('click', () => filmstrip.scrollBy({ left:  getScrollAmt(), behavior: 'smooth' }));
            btnPrev.addEventListener('click', () => filmstrip.scrollBy({ left: -getScrollAmt(), behavior: 'smooth' }));
        }

        // =========================================================
        // SCROLL ANIMATION — phone card shrink + reveal
        // =========================================================
        function initScrollAnimation() {
            const wrapper      = document.getElementById('phone-scroll-wrapper');
            const card         = document.getElementById('phone-inner-card');
            const revealEls    = document.querySelectorAll('.ds-reveal-el');
            const containerCell = document.querySelector('.ds-3d-container-cell');
            const phoneWrapper = document.querySelector('.ds-3d-wrapper');

            if (!wrapper || !card) return;

            const reduced = prefersReducedMotion();
            const { shrinkStart, shrinkDuration, maxCardWidth, maxHeightReduce, maxBorderRadius, revealStagger, revealDuration } = CONFIG.scrollAnim;

            if (reduced) {
                revealEls.forEach(el => { el.style.opacity = 1; el.style.transform = 'none'; });
            }

            function update() {
                const rect           = wrapper.getBoundingClientRect();
                const scrollDistance = wrapper.offsetHeight - window.innerHeight;
                const progress       = clamp(-rect.top / scrollDistance, 0, 1);

                // Staggered reveal for text elements
                if (!reduced) {
                    revealEls.forEach((el, i) => {
                        const start = i * revealStagger;
                        const end   = start + revealDuration;
                        const t     = easeOutCubic(clamp((progress - start) / (end - start), 0, 1));
                        el.style.opacity   = t;
                        el.style.transform = `translateY(${(1 - t) * 3}rem)`;
                    });

                    // Card shrink/round animation
                    const shrinkRaw = clamp((progress - shrinkStart) / shrinkDuration, 0, 1);
                    const ease      = easeInOutQuad(shrinkRaw);
                    const vw        = document.documentElement.clientWidth;
                    const targetW   = Math.min(vw - 48, maxCardWidth - 48);

                    card.style.width        = `calc(100% - ${ease * (vw - targetW)}px)`;
                    card.style.height       = `calc(100vh - ${ease * maxHeightReduce}px)`;
                    card.style.borderRadius = `${ease * maxBorderRadius}px`;
                }

                // Phone mockup scale-to-fit
                if (containerCell && phoneWrapper) {
                    // Phone natural size: 340 × 680 px; add 40 px breathing room
                    const scaleY = containerCell.clientHeight / (680 + 40);
                    const scaleX = containerCell.clientWidth  / (340 + 40);
                    const scale  = clamp(Math.min(scaleX, scaleY), 0.2, 0.9);
                    phoneWrapper.style.transform = `scale(${scale})`;
                }
            }

            return update;
        }

        // =========================================================
        // SHARE SECTION — wave ring reveal on scroll
        // =========================================================
        function initShareSection() {
            const section = document.getElementById('share-section');
            const rings   = section ? section.querySelectorAll('.wave-ring') : [];

            if (!section || rings.length === 0) return;

            function update() {
                const rect     = section.getBoundingClientRect();
                const vh       = window.innerHeight;
                // Progress: 0 when section top is at 80% viewport, 1 when section scrolls past.
                const progress = clamp((vh * 0.8 - rect.top) / (vh * 0.8 + rect.height * 0.2), 0, 1);

                rings.forEach((ring, i) => {
                    const threshold = (i + 1) / (rings.length + 1);
                    const active    = progress > threshold;
                    ring.classList.toggle('active', active);
                    ring.querySelectorAll('.face-avatar').forEach(f => f.classList.toggle('visible', active));
                });
            }

            return update;
        }

        // =========================================================
        // BUTTON LOADING STATE DEMO (Odvozeno z designu)
        // =========================================================
        function initButtons() {
            const buttons = document.querySelectorAll('.btn-primary, .btn-pricing-new');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (this.classList.contains('is-loading')) return;
                    
                    const originalText = this.innerHTML;
                    
                    // Krok 1: Vyvolání akce (Načítám...)
                    this.classList.add('is-loading');
                    this.textContent = 'Načítám ...';
                    
                    // Krok 2: Provedení akce (Úspěch)
                    setTimeout(() => {
                        this.textContent = 'Provedení akce';
                        this.style.background = '#22c55e'; // Krátce zezelená pro indikaci úspěchu
                        
                        // Krok 3: Návrat do původního stavu
                        setTimeout(() => {
                            this.classList.remove('is-loading');
                            this.innerHTML = originalText;
                            this.style.background = ''; // reset do původní CSS proměnné
                        }, 2000);
                    }, 1500);
                });
            });
        }

        // =========================================================
        // COMBINED SCROLL / RESIZE HANDLER (single rAF per frame)
        // =========================================================
        function initScrollHandler(updateFns) {
            let pending = false;

            function onFrame() {
                updateFns.forEach(fn => fn && fn());
                pending = false;
            }

            function schedule() {
                if (!pending) {
                    requestAnimationFrame(onFrame);
                    pending = true;
                }
            }

            window.addEventListener('scroll', schedule, { passive: true });
            window.addEventListener('resize', schedule, { passive: true });
            schedule(); // run once on load
        }

        // =========================================================
        // 3D PHONE CAROUSEL (auto-rotating TikTok-style cards)
        // Returns a cleanup function.
        // =========================================================
        function initPhoneCarousel() {
            const items = document.querySelectorAll('.c3d-item');
            if (items.length === 0) return () => {};

            const total   = items.length;
            let activeIdx = 0;
            const reduced = prefersReducedMotion();

            // Position offsets for each relative slot (0 = center, ±1 = sides, ±2+ = hidden)
            const SLOT_STYLES = [
                /* offset  0 */ { tx:    0, tz:    0, scale: 1,    ry:   0, z: 50, opacity: 1,   brightness: 1,   active: true  },
                /* offset -1 */ { tx: -220, tz: -100, scale: 0.85, ry:  12, z: 40, opacity: 0.9, brightness: 0.5, active: false },
                /* offset +1 */ { tx:  220, tz: -100, scale: 0.85, ry: -12, z: 40, opacity: 0.9, brightness: 0.5, active: false },
                /* offset -2 */ { tx: -380, tz: -250, scale: 0.7,  ry:  20, z: 30, opacity: 0.6, brightness: 0.3, active: false },
                /* offset +2 */ { tx:  380, tz: -250, scale: 0.7,  ry: -20, z: 30, opacity: 0.6, brightness: 0.3, active: false },
            ];

            function getSlotStyle(offset) {
                if (offset === 0)  return SLOT_STYLES[0];
                if (offset === -1) return SLOT_STYLES[1];
                if (offset === 1)  return SLOT_STYLES[2];
                if (offset <= -2)  return SLOT_STYLES[3];
                return SLOT_STYLES[4];
            }

            function render(instant) {
                items.forEach((item, i) => {
                    let offset = i - activeIdx;
                    // Wrap offset for circular layout
                    if (offset >  Math.floor(total / 2)) offset -= total;
                    if (offset < -Math.floor(total / 2)) offset += total;

                    const s = getSlotStyle(offset);
                    item.style.transition = (instant || reduced)
                        ? 'none'
                        : 'all 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
                    item.style.transform  = `translateX(${s.tx}px) translateZ(${s.tz}px) scale(${s.scale}) rotateY(${s.ry}deg)`;
                    item.style.zIndex     = s.z;
                    item.style.opacity    = s.opacity;
                    item.style.filter     = `brightness(${s.brightness})`;
                    item.classList.toggle('is-active', s.active);
                });
            }

            // First frame: set positions instantly, then enable transitions.
            render(true);
            requestAnimationFrame(() => requestAnimationFrame(() => render(false)));

            const timerId = setInterval(() => {
                activeIdx = (activeIdx + 1) % total;
                render(false);
            }, CONFIG.carousel.interval);

            return () => clearInterval(timerId);
        }

        // =========================================================
        // BOOTSTRAP
        // =========================================================
        function init() {
            initFooterYear();
            initButtons(); // Inicializace interakcí tlačítek

            const cleanupSticker = initSticker();
            initFilmstrip();

            const updateScroll = initScrollAnimation();
            const updateShare  = initShareSection();

            initScrollHandler([updateScroll, updateShare]);

            // Defer heavy carousel init until browser is idle
            const scheduleIdle = window.requestIdleCallback
                ? (fn) => requestIdleCallback(fn, { timeout: 2000 })
                : (fn) => setTimeout(fn, 200);

            let cleanupCarousel = () => {};
            scheduleIdle(() => { cleanupCarousel = initPhoneCarousel() || (() => {}); });

            // Cleanup all intervals when the page is hidden/unloaded
            window.addEventListener('pagehide', () => {
                cleanupSticker();
                cleanupCarousel();
            });
        }

        // Run after DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>
</body>
</html>
