<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIBE NET - Internet Without The Leash. Forget cables. Forget landlords. The web flows where you flow.">
    <meta name="theme-color" content="#ffffff">
    <title>VIBE NET | Internet Without The Leash</title>
    <style>
        :root {
            --apple-blue: #0056b3; 
            --apple-blue-hover: #004085; 
            --apple-black: #1d1d1f;
            --apple-gray: #86868b;
            --apple-light-gray: #f5f5f7;
            --apple-bg: #ffffff;
            --sys-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--apple-bg); color: var(--apple-black); font-family: var(--sys-font); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .font-display { font-weight: 700; letter-spacing: -0.02em; }
        .container { width: 100%; max-width: 75rem; margin: 0 auto; padding: 0 1.5rem; }

        /* CAROUSEL */
        .carousel-section { width: 100%; padding-top: 6rem; padding-bottom: 6rem; overflow: hidden; }
        .carousel-header { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .carousel-header h2 { font-size: 3rem; color: var(--apple-black); margin: 0; }
        .filmstrip-container { display: flex; overflow-x: auto; padding: 2.5rem 1.5rem 5rem; gap: 2rem; scrollbar-width: none; }
        .filmstrip-container::-webkit-scrollbar { display: none; }
        .filmstrip-card { flex: 0 0 85vw; max-width: 31.25rem; height: 37.5rem; padding: 3rem; border-radius: 3rem; background: var(--apple-light-gray); display: flex; flex-direction: column; justify-content: space-between; }
        @media (min-width: 48rem) { .filmstrip-card { flex: 0 0 40vw; } }
        
        .fs-title { font-size: 2.25rem; color: var(--apple-black); margin: 0 0 1rem 0; }
        .fs-desc { color: var(--apple-gray); font-size: 1.125rem; margin: 0; }

        /* LANDSCAPE CARD */
        .fs-landscape {
            flex: 0 0 90vw !important;
            max-width: 100% !important;
            aspect-ratio: 16 / 9 !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        @media (max-width: 768px) {
            .fs-landscape { aspect-ratio: auto !important; min-height: 400px; }
        }
        
        .fs-landscape::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        
        .fs-landscape-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
        }
        
        .fs-landscape-content .fs-title {
            font-size: 2.5rem;
            margin: 0;
        }
        
        .fs-landscape-content .fs-title span:first-child {
            color: var(--apple-blue);
            display: block;
        }
        
        .fs-landscape-content .fs-title span:last-child {
            color: var(--apple-black);
            display: block;
        }
    </style>
</head>
<body>
    <section class="carousel-section">
        <div class="container carousel-header">
            <h2 class="font-display">Signal. Everywhere.</h2>
        </div>
        
        <div class="filmstrip-container">
            <div class="filmstrip-card"><h3 class="font-display fs-title">Nomad Puck 1.0</h3><p class="fs-desc">Your personal Wi-Fi bubble.</p></div>
            <div class="filmstrip-card"><h3 class="font-display fs-title">5G Ultra</h3><p class="fs-desc">Experience speeds that make fiber look like dial-up.</p></div>
            <div class="filmstrip-card"><h3 class="font-display fs-title">Ghost Mode</h3><p class="fs-desc">No tracking. No contracts.</p></div>
            <div class="filmstrip-card"><h3 class="font-display fs-title">Tech Specs</h3><p class="fs-desc">Precision engineering.</p></div>
            <div class="filmstrip-card"><h3 class="font-display fs-title">Share Signal</h3><p class="fs-desc">One Puck. Up to 10 friends.</p></div>

            <!-- LANDSCAPE CARD - Sdílej připojení -->
            <div class="filmstrip-card fs-landscape" style="background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="fs-landscape-content">
                    <h3 class="font-display fs-title">
                        <span>Sdílej připojení</span>
                        <span>se svými přáteli.</span>
                    </h3>
                </div>
            </div>
            
            <div style="flex: 0 0 2rem;"></div>
        </div>
    </section>
</body>
</html>
